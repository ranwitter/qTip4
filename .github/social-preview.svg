<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">qTip4 GitHub Social Preview</title>
  <desc id="desc">A 1280 by 640 social preview image for qTip4 with a 40pt border and branded text.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="120" x2="1160" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <circle cx="1080" cy="130" r="130" fill="#67E8F9" opacity="0.22" filter="url(#soft)"/>
  <circle cx="220" cy="520" r="165" fill="#C4B5FD" opacity="0.2" filter="url(#soft)"/>

  <rect x="120" y="120" width="1040" height="400" rx="24" fill="url(#accent)" stroke="rgba(255,255,255,0.22)"/>

  <text x="640" y="290" text-anchor="middle" fill="#F8FAFC"
        font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="110" letter-spacing="1.2">qTip4</text>

  <text x="640" y="355" text-anchor="middle" fill="#E2E8F0"
        font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-weight="500" font-size="38">Pretty powerful tooltips for jQuery 4+</text>

  <text x="640" y="430" text-anchor="middle" fill="#BAE6FD"
        font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-weight="600" font-size="30">github.com/ranwitter/qTip4</text>

  <rect x="40" y="40" width="1200" height="560" rx="18" fill="none" stroke="#F8FAFC" stroke-opacity="0.9" stroke-width="40pt"/>
</svg>
